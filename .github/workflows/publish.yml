name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npx biome check src/
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm publish --access public || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ghpr:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to GitHub Packages
        run: npm publish --access public || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  publish-binaries:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            server: mcp-telegram-linux-x64
            login: mcp-telegram-login-linux-x64
          - target: bun-linux-arm64
            server: mcp-telegram-linux-arm64
            login: mcp-telegram-login-linux-arm64
          - target: bun-darwin-x64
            server: mcp-telegram-darwin-x64
            login: mcp-telegram-login-darwin-x64
          - target: bun-darwin-arm64
            server: mcp-telegram-darwin-arm64
            login: mcp-telegram-login-darwin-arm64
          - target: bun-windows-x64
            server: mcp-telegram-windows-x64.exe
            login: mcp-telegram-login-windows-x64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Compile MCP server binary
        run: bun build src/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.server }}

      - name: Compile login CLI binary
        run: bun build src/qr-login-cli.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.login }}

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ matrix.server }} --clobber
          gh release upload ${{ github.event.release.tag_name }} ${{ matrix.login }} --clobber
